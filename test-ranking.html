<!DOCTYPE html>
<!-- 제안자 순위 로직 검증 테스트 파일 -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제안자 순위 로직 테스트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', sans-serif; padding: 24px; background: #f5f5f5; }
  h1 { font-size: 20px; margin-bottom: 8px; }
  .subtitle { color: #666; font-size: 13px; margin-bottom: 20px; }
  .section { background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  .section h2 { font-size: 15px; margin-bottom: 12px; border-bottom: 2px solid #1a73e8; padding-bottom: 6px; color: #1a73e8; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #263238; color: #fff; padding: 8px 6px; text-align: center; border: 1px solid #455a64; }
  td { padding: 7px 6px; border: 1px solid #ddd; vertical-align: middle; }
  tr:nth-child(even) td { background: #f9f9f9; }
  .top-row td { background: #fffde7 !important; }
  .pass { color: #2e7d32; font-weight: 700; }
  .fail { color: #c62828; font-weight: 700; }
  .result-box { padding: 12px 16px; border-radius: 8px; margin-top: 12px; font-size: 14px; font-weight: 600; }
  .result-pass { background: #e8f5e9; color: #1b5e20; border: 1px solid #a5d6a7; }
  .result-fail { background: #ffebee; color: #b71c1c; border: 1px solid #ef9a9a; }
  .stat-row { display: flex; gap: 16px; margin-bottom: 12px; }
  .stat-chip { background: #e3f2fd; color: #0d47a1; padding: 4px 12px; border-radius: 16px; font-size: 13px; font-weight: 600; }
  .log { font-size: 12px; color: #555; margin-top: 8px; padding: 10px; background: #f5f5f5; border-radius: 6px; white-space: pre-wrap; }
  .btn { padding: 8px 18px; background: #1a73e8; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; margin-right: 8px; }
  .btn-gray { background: #546e7a; }
  .btn-green { background: #2e7d32; }
</style>
</head>
<body>
<h1>📊 제안자 순위 로직 테스트</h1>
<p class="subtitle">proposals-view.js의 _computeRank() 알고리즘을 독립 환경에서 검증합니다.</p>

<div class="section">
  <h2>🧪 테스트 데이터</h2>
  <div class="stat-row">
    <span class="stat-chip" id="total-count">총 0건</span>
    <span class="stat-chip" id="proposer-count">제안자 0명</span>
  </div>
  <table id="mock-table">
    <thead>
      <tr><th>#</th><th>소속</th><th>부서</th><th>이름</th><th>상태</th><th>제출일</th></tr>
    </thead>
    <tbody id="mock-tbody"></tbody>
  </table>
</div>

<div class="section">
  <h2>🏆 순위 결과</h2>
  <div class="stat-row" id="rank-stats"></div>
  <table id="rank-table">
    <thead>
      <tr><th>순위</th><th>소속</th><th>부서</th><th>이름</th><th>제안건수</th><th>완료</th><th>검토중</th><th>접수</th><th>반려</th><th>최근 제출일</th></tr>
    </thead>
    <tbody id="rank-tbody"></tbody>
  </table>
</div>

<div class="section">
  <h2>✅ 자동화 검증</h2>
  <div id="test-results"></div>
  <div id="test-summary" class="result-box" style="display:none"></div>
</div>

<div style="margin-top: 16px">
  <button class="btn" onclick="runAllTests()">▶ 전체 테스트 실행</button>
  <button class="btn btn-gray" onclick="addEdgeCases()">➕ 엣지케이스 추가</button>
  <button class="btn btn-green" onclick="resetMockData()">🔄 초기 데이터로 리셋</button>
</div>

<script>
// ── 모의 App.escapeHtml ─────────────────────────────────────────
const App = {
  escapeHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
};

// ── _computeRank 알고리즘 (proposals-view.js와 동일) ──────────────
function computeRank(proposals) {
  const map = {};
  for (const p of proposals) {
    const key = `${p.affiliation}||${p.department}||${p.name}`;
    if (!map[key]) {
      map[key] = {
        affiliation: p.affiliation || '',
        department:  p.department  || '',
        name:        p.name        || '',
        total: 0, 완료: 0, 검토중: 0, 접수: 0, 반려: 0,
        lastDate: ''
      };
    }
    const e = map[key];
    e.total++;
    const s = p.status || '접수';
    e[s] = (e[s] || 0) + 1;
    if (!e.lastDate || p.createdAt > e.lastDate) e.lastDate = p.createdAt;
  }
  return Object.values(map)
    .sort((a, b) => b.total - a.total || a.name.localeCompare(b.name, 'ko'));
}

// ── 기본 모의 데이터 ────────────────────────────────────────────
const BASE_MOCK = [
  { id:'p1',  affiliation:'삼화건설', department:'안전팀',  name:'김철수', status:'완료',  createdAt:'2026-01-05T09:00:00Z' },
  { id:'p2',  affiliation:'삼화건설', department:'안전팀',  name:'김철수', status:'완료',  createdAt:'2026-02-10T10:00:00Z' },
  { id:'p3',  affiliation:'삼화건설', department:'안전팀',  name:'김철수', status:'검토중', createdAt:'2026-03-15T11:00:00Z' },
  { id:'p4',  affiliation:'삼화건설', department:'안전팀',  name:'김철수', status:'접수',  createdAt:'2026-04-20T12:00:00Z' },
  { id:'p5',  affiliation:'삼화건설', department:'시공팀',  name:'이영희', status:'완료',  createdAt:'2026-02-01T08:00:00Z' },
  { id:'p6',  affiliation:'삼화건설', department:'시공팀',  name:'이영희', status:'접수',  createdAt:'2026-03-01T08:00:00Z' },
  { id:'p7',  affiliation:'삼화건설', department:'시공팀',  name:'이영희', status:'반려',  createdAt:'2026-04-01T08:00:00Z' },
  { id:'p8',  affiliation:'삼화산업', department:'현장팀',  name:'박민준', status:'완료',  createdAt:'2026-01-20T14:00:00Z' },
  { id:'p9',  affiliation:'삼화산업', department:'현장팀',  name:'박민준', status:'검토중', createdAt:'2026-05-01T14:00:00Z' },
  { id:'p10', affiliation:'삼화산업', department:'관리팀',  name:'최지연', status:'접수',  createdAt:'2026-03-10T16:00:00Z' },
  { id:'p11', affiliation:'삼화산업', department:'관리팀',  name:'최지연', status:'검토중', createdAt:'2026-04-10T16:00:00Z' },
  { id:'p12', affiliation:'협력업체', department:'전기팀',  name:'정대현', status:'접수',  createdAt:'2026-05-10T10:00:00Z' },
  // 동명이인 (다른 소속·부서 → 별도 카운트)
  { id:'p13', affiliation:'협력업체', department:'설비팀',  name:'김철수', status:'완료',  createdAt:'2026-03-01T09:00:00Z' },
  { id:'p14', affiliation:'협력업체', department:'설비팀',  name:'김철수', status:'접수',  createdAt:'2026-04-01T09:00:00Z' },
];

let mockData = [...BASE_MOCK];

function resetMockData() {
  mockData = [...BASE_MOCK];
  renderMockTable();
  renderRankTable();
  clearTests();
}

function addEdgeCases() {
  mockData.push(
    // 제안 0건 (이 케이스는 목록에 나타나지 않아야 함 — 데이터 자체가 없음)
    // 동일인이 상태 없이 제출
    { id:'p_edge1', affiliation:'삼화건설', department:'안전팀', name:'김철수', status: undefined, createdAt:'2026-05-20T09:00:00Z' },
    // createdAt 없는 경우
    { id:'p_edge2', affiliation:'협력업체', department:'전기팀', name:'정대현', status:'완료', createdAt: '' },
    // 소속만 다른 동명이인
    { id:'p_edge3', affiliation:'기타', department:'시공팀', name:'이영희', status:'완료', createdAt:'2026-05-21T10:00:00Z' }
  );
  renderMockTable();
  renderRankTable();
  log('엣지케이스 3건 추가됨 (status:undefined, createdAt:\'\', 동명이인 다른소속)');
}

// ── 렌더링 ───────────────────────────────────────────────────────
function renderMockTable() {
  document.getElementById('total-count').textContent = `총 ${mockData.length}건`;
  const unique = new Set(mockData.map(p => `${p.affiliation}||${p.department}||${p.name}`)).size;
  document.getElementById('proposer-count').textContent = `제안자 ${unique}명`;
  const tbody = document.getElementById('mock-tbody');
  tbody.innerHTML = mockData.map((p, i) => `
    <tr>
      <td style="text-align:center">${i+1}</td>
      <td>${App.escapeHtml(p.affiliation)}</td>
      <td>${App.escapeHtml(p.department)}</td>
      <td>${App.escapeHtml(p.name)}</td>
      <td style="text-align:center">${p.status || '(없음)'}</td>
      <td style="text-align:center;font-size:12px">${p.createdAt ? new Date(p.createdAt).toLocaleDateString('ko-KR') : '-'}</td>
    </tr>`).join('');
}

function renderRankTable() {
  const ranked = computeRank(mockData);
  const total     = mockData.length;
  const completed = mockData.filter(p => p.status === '완료').length;
  const rate      = total ? Math.round(completed / total * 100) : 0;
  const MEDALS    = ['🥇', '🥈', '🥉'];

  document.getElementById('rank-stats').innerHTML = `
    <span class="stat-chip">총 제안 <b>${total}</b>건</span>
    <span class="stat-chip">제안자 <b>${ranked.length}</b>명</span>
    <span class="stat-chip">완료율 <b>${rate}%</b></span>`;

  const tbody = document.getElementById('rank-tbody');
  tbody.innerHTML = ranked.map((r, i) => `
    <tr class="${i < 3 ? 'top-row' : ''}">
      <td style="text-align:center">${MEDALS[i] || i+1}</td>
      <td>${App.escapeHtml(r.affiliation)}</td>
      <td>${App.escapeHtml(r.department)}</td>
      <td><b>${App.escapeHtml(r.name)}</b></td>
      <td style="text-align:center;font-weight:700;color:#1a237e">${r.total}</td>
      <td style="text-align:center;color:#2e7d32">${r.완료}</td>
      <td style="text-align:center;color:#e65100">${r.검토중}</td>
      <td style="text-align:center;color:#1565c0">${r.접수}</td>
      <td style="text-align:center;color:#c62828">${r.반려}</td>
      <td style="text-align:center;font-size:12px">${r.lastDate ? new Date(r.lastDate).toLocaleDateString('ko-KR') : '-'}</td>
    </tr>`).join('');
}

// ── 자동 검증 테스트 ─────────────────────────────────────────────
let testLog = [];
function log(msg) { testLog.push(msg); }
function clearTests() { testLog = []; document.getElementById('test-results').innerHTML = ''; document.getElementById('test-summary').style.display = 'none'; }

function assert(label, condition, expected, actual) {
  const ok = condition;
  const div = document.createElement('div');
  div.style.cssText = `padding:6px 10px;margin:4px 0;border-radius:6px;font-size:13px;
    background:${ok?'#e8f5e9':'#ffebee'};border:1px solid ${ok?'#a5d6a7':'#ef9a9a'}`;
  div.innerHTML = `<span class="${ok?'pass':'fail'}">${ok?'✅ PASS':'❌ FAIL'}</span>  ${label}`
    + (ok ? '' : `<br><span style="font-size:11px;color:#555">기대: ${JSON.stringify(expected)} / 실제: ${JSON.stringify(actual)}</span>`);
  document.getElementById('test-results').appendChild(div);
  return ok;
}

function runAllTests() {
  clearTests();
  const results = [];
  const ranked = computeRank(BASE_MOCK);

  // T1: 1위는 김철수(삼화건설/안전팀) — 4건
  results.push(assert(
    'T1: 1위 제안자는 김철수(삼화건설/안전팀) — 4건',
    ranked[0].name === '김철수' && ranked[0].affiliation === '삼화건설' && ranked[0].total === 4,
    { name:'김철수', affiliation:'삼화건설', total:4 },
    { name: ranked[0].name, affiliation: ranked[0].affiliation, total: ranked[0].total }
  ));

  // T2: 제안건수 내림차순 정렬 확인
  let sortedOk = true;
  for (let i = 0; i < ranked.length - 1; i++) {
    if (ranked[i].total < ranked[i+1].total) { sortedOk = false; break; }
  }
  results.push(assert('T2: 순위가 제안건수 내림차순으로 정렬됨', sortedOk, '내림차순', '정렬 오류'));

  // T3: 동명이인(김철수 협력업체/설비팀)은 별도 카운트
  const cheolsu2 = ranked.find(r => r.name === '김철수' && r.affiliation === '협력업체');
  results.push(assert(
    'T3: 동명이인(협력업체/설비팀 김철수) 별도 집계됨',
    cheolsu2 !== undefined && cheolsu2.total === 2,
    { found: true, total: 2 },
    { found: cheolsu2 !== undefined, total: cheolsu2?.total }
  ));

  // T4: 이영희(삼화건설/시공팀) 상태별 카운트 검증
  const yh = ranked.find(r => r.name === '이영희' && r.affiliation === '삼화건설');
  results.push(assert(
    'T4: 이영희 완료:1, 접수:1, 반려:1 — 합계 3건',
    yh && yh.완료 === 1 && yh.접수 === 1 && yh.반려 === 1 && yh.total === 3,
    { 완료:1, 접수:1, 반려:1, total:3 },
    { 완료: yh?.완료, 접수: yh?.접수, 반려: yh?.반려, total: yh?.total }
  ));

  // T5: 최근 제출일이 가장 최신 날짜인지
  const cs = ranked.find(r => r.name === '김철수' && r.affiliation === '삼화건설');
  results.push(assert(
    'T5: 김철수(삼화건설) 최근 제출일 = 2026-04-20',
    cs && cs.lastDate.startsWith('2026-04-20'),
    '2026-04-20',
    cs?.lastDate?.slice(0,10)
  ));

  // T6: 빈 배열 처리
  const empty = computeRank([]);
  results.push(assert('T6: 빈 배열 입력 시 빈 배열 반환', empty.length === 0, 0, empty.length));

  // T7: status 미정의 시 '접수'로 카운트
  const withUndefined = computeRank([
    { id:'x', affiliation:'A', department:'B', name:'홍길동', status: undefined, createdAt:'2026-01-01T00:00:00Z' }
  ]);
  results.push(assert(
    "T7: status 미정의 → '접수'로 카운트",
    withUndefined[0]?.접수 === 1,
    1,
    withUndefined[0]?.접수
  ));

  // T8: createdAt 없어도 오류 없이 동작
  let noErr = true;
  try {
    computeRank([{ id:'y', affiliation:'A', department:'B', name:'홍길동', status:'완료', createdAt:'' }]);
  } catch(e) { noErr = false; }
  results.push(assert('T8: createdAt 빈 문자열 처리 시 오류 없음', noErr, true, noErr));

  // T9: 총 제안자 수 일치
  results.push(assert(
    'T9: BASE_MOCK 고유 제안자 수 = 5명 (삼화건설 김철수·이영희, 삼화산업 박민준·최지연, 협력업체 정대현, 협력업체 김철수)',
    ranked.length === 6,
    6,
    ranked.length
  ));

  // 최종 결과
  const passCount = results.filter(Boolean).length;
  const summary = document.getElementById('test-summary');
  summary.style.display = 'block';
  summary.className = `result-box ${passCount === results.length ? 'result-pass' : 'result-fail'}`;
  summary.textContent = `${passCount === results.length ? '✅ 전체 통과' : '❌ 일부 실패'} — ${passCount} / ${results.length} 테스트 통과`;
}

// ── 초기화 ────────────────────────────────────────────────────────
renderMockTable();
renderRankTable();
</script>
</body>
</html>
