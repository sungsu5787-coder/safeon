<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알림톡 테스트</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 10px; padding: 10px; background: #f8f9fa; border-radius: 4px; }
        .success { border-left: 4px solid #28a745; }
        .error { border-left: 4px solid #dc3545; }
    </style>
</head>
<body>
    <h1>🔔 SafeOn 알림톡 테스트</h1>

    <div class="test-section">
        <h2>1. 알림톡 API 직접 테스트</h2>
        <button onclick="testAlimtalkAPI()">알림톡 API 테스트</button>
        <div id="api-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>2. 테스트 데이터 추가 (Firestore)</h2>
        <p>다음 데이터를 Firestore에 추가하여 실제 알림을 발생시킵니다:</p>
        <button onclick="addTestPTW()">PTW 만료 임박 데이터 추가</button>
        <button onclick="addTestRisk()">위험성평가 지연 데이터 추가</button>
        <div id="firestore-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>3. 알림 시스템 상태 확인</h2>
        <button onclick="checkNotifyConfig()">알림 설정 확인</button>
        <button onclick="checkServerHealth()">서버 상태 확인</button>
        <div id="status-result" class="result"></div>
    </div>

    <script type="module">
        // Firebase 초기화 (앱과 동일)
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
        import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDmPqngE7WIfu6ejgTE64R71IiEZz7SzuQ",
            authDomain: "samhwa-safeon.firebaseapp.com",
            projectId: "samhwa-safeon",
            storageBucket: "samhwa-safeon.firebasestorage.app",
            messagingSenderId: "289570800087",
            appId: "1:289570800087:web:ebdfd0a425a98475800b92"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 알림톡 API 테스트
        window.testAlimtalkAPI = async function() {
            const resultDiv = document.getElementById('api-result');
            resultDiv.innerHTML = '테스트 중...';

            try {
                const response = await fetch('/api/send-alimtalk', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        recipientPhone: '+821012345678',
                        templateId: 'TEST_TEMPLATE_001',
                        message: {
                            title: '알림톡 테스트',
                            body: 'SafeOn 알림 시스템 테스트 메시지입니다.'
                        }
                    })
                });

                const result = await response.json();
                resultDiv.innerHTML = `
                    <div class="success">
                        <strong>✅ API 테스트 성공!</strong><br>
                        응답: ${JSON.stringify(result, null, 2)}
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <strong>❌ API 테스트 실패</strong><br>
                        오류: ${error.message}
                    </div>
                `;
            }
        };

        // PTW 테스트 데이터 추가
        window.addTestPTW = async function() {
            const resultDiv = document.getElementById('firestore-result');
            resultDiv.innerHTML = 'PTW 데이터 추가 중...';

            try {
                const today = new Date();
                const tomorrow = new Date(today);
                tomorrow.setDate(today.getDate() + 1);

                await addDoc(collection(db, 'ptw'), {
                    workName: '알림톡 테스트 작업허가서',
                    company: '테스트 회사',
                    status: 'approved',
                    date: today.toISOString().split('T')[0],
                    periodEnd: tomorrow.toISOString().split('T')[0] + 'T23:59:59',
                    createdAt: serverTimestamp()
                });

                resultDiv.innerHTML = `
                    <div class="success">
                        <strong>✅ PTW 테스트 데이터 추가 완료!</strong><br>
                        - 작업명: 알림톡 테스트 작업허가서<br>
                        - 만료일: 내일 (${tomorrow.toLocaleDateString()})<br>
                        - 상태: 승인됨<br>
                        <br>
                        <em>앱을 새로고침하면 알림이 표시되고 알림톡이 전송됩니다.</em>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <strong>❌ PTW 데이터 추가 실패</strong><br>
                        오류: ${error.message}
                    </div>
                `;
            }
        };

        // 위험성평가 테스트 데이터 추가
        window.addTestRisk = async function() {
            const resultDiv = document.getElementById('firestore-result');
            resultDiv.innerHTML = '위험성평가 데이터 추가 중...';

            try {
                const today = new Date();

                await addDoc(collection(db, 'risk'), {
                    workName: '알림톡 테스트 위험성평가',
                    improveStatus: '지연',
                    planDate: today.toISOString().split('T')[0],
                    date: today.toISOString().split('T')[0],
                    createdAt: serverTimestamp()
                });

                resultDiv.innerHTML = `
                    <div class="success">
                        <strong>✅ 위험성평가 테스트 데이터 추가 완료!</strong><br>
                        - 작업명: 알림톡 테스트 위험성평가<br>
                        - 상태: 개선 지연<br>
                        - 예정일: 오늘 (${today.toLocaleDateString()})<br>
                        <br>
                        <em>앱을 새로고침하면 알림이 표시되고 알림톡이 전송됩니다.</em>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <strong>❌ 위험성평가 데이터 추가 실패</strong><br>
                        오류: ${error.message}
                    </div>
                `;
            }
        };

        // 알림 설정 확인
        window.checkNotifyConfig = async function() {
            const resultDiv = document.getElementById('status-result');
            resultDiv.innerHTML = '알림 설정 확인 중...';

            try {
                const response = await fetch('/api/notify-config');
                const config = await response.json();

                resultDiv.innerHTML = `
                    <div class="success">
                        <strong>✅ 알림 설정 상태</strong><br>
                        - 활성화: ${config.enabled ? '✅' : '❌'}<br>
                        - 수신자: ${config.recipientPhone}<br>
                        - 템플릿: ${config.templateId}<br>
                        - 전송 타입: ${config.sendOnTypes.join(', ')}
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <strong>❌ 설정 확인 실패</strong><br>
                        오류: ${error.message}
                    </div>
                `;
            }
        };

        // 서버 상태 확인
        window.checkServerHealth = async function() {
            const resultDiv = document.getElementById('status-result');
            resultDiv.innerHTML = '서버 상태 확인 중...';

            try {
                const response = await fetch('/api/health');
                const health = await response.json();

                resultDiv.innerHTML = `
                    <div class="success">
                        <strong>✅ 서버 상태: ${health.status}</strong><br>
                        - 백엔드 서버 정상 동작 중<br>
                        - 알림톡 API 준비 완료
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <strong>❌ 서버 연결 실패</strong><br>
                        오류: ${error.message}
                    </div>
                `;
            }
        };
    </script>
</body>
</html>
